backtest:
  symbols:
    - "000852.SH"
  start_date: "2015-01-01"
  end_date: "2025-01-01"
  base_timeframe: "1d"
  initial_capital: 1000000.0
  plot: true
  benchmark: "000852.SH"

strategy:
  name: "MicroValueStrategy"
  top_n: 9

position_sizing:
  type: "EqualWeightSizer"

risk:
  system_gate:
    index_symbol: "000852.SH"
    ma_period: 20
  stop_loss:
    max_loss_ratio: 0.03
  circuit_breaker:
    enabled: false
    max_daily_loss: 0.03
    max_total_drawdown: 0.20
    cooldown_days: 1
  notification:
    console: true
    wechat:
      enabled: false
      webhook_url: ""
    email:
      enabled: false
      smtp_host: ""
      smtp_port: 465
      sender: ""
      password: ""
      receivers: []
  policies:
    - "limit_up_break"
    - "hard_stop_loss"

costs:
  commission_rate: 0.0002
  tax_rate: 0.001
  min_commission: 5.0
  slippage: 0.003

data:
  cache_dir: "data/"
  # DuckDB 快路径读本地 market.duckdb（已履约 2021-2025 全市场日线）;
  # 库内缺数时自动回退 QMT（需客户端在线）。Web 回测任务与 CLI 共用此口径。
  history_fetcher: "DuckDBHistoryDataFetcher"
  tushare:
    # Tushare token - 从环境变量 TUSHARE_TOKEN 读取
    # 后续主要使用 QMT 数据源，此 token 仅作备用
    token: "${TUSHARE_TOKEN}"