qmt:
  userdata_path: "C:\\QMT\\userdata_mini"
  session_id: 123456
  account_id: "${QMT_ACCOUNT_ID}"
  account_type: "STOCK"

risk:
  policies:
    - "SimpleRiskPolicy"

trading:
  symbols:
    - "600000.SH"
  timeframe: "1d"
  bar_lookback: 100

live_trade:
  strategy: "dual_ma"
  symbols:
    - "600096.SH"
    - "605589.SH"
    - "000021.SZ"
    - "002284.SZ"
    - "002648.SZ"
  position_ratio: 0.1
  slippage_buy: 0.001
  slippage_sell: 0.001
  bar_lookback: 100
  # strategy_params:
  #   top_n: 9

monitor:
  refresh_interval: 3
  snapshot_dir: "data/snapshots/"
  alerts:
    daily_loss_threshold: 0.03
    stock_loss_threshold: 0.05
    position_ratio_max: 0.80
    position_ratio_min: 0.10
    concentration_max: 0.30
