qmt:
  userdata_path: "C:\\QMT\\userdata_mini"
  session_id: 123456
  account_id: "${QMT_ACCOUNT_ID}"
  account_type: "STOCK"

risk:
  policies:
    - "SimpleRiskPolicy"

trading:
  symbols:
    - "600000.SH"
  timeframe: "1d"
  bar_lookback: 100

live_trade:
  strategy: "dual_ma"
  symbols:
    - "600096.SH"
    - "605589.SH"
    - "000021.SZ"
    - "002284.SZ"
    - "002648.SZ"
  position_ratio: 0.1
  slippage_buy: 0.001
  slippage_sell: 0.001
  bar_lookback: 100
  # strategy_params:
  #   top_n: 9

auto_trade:
  enabled: false              # 双保险: 跑时 --enable
  mode: dry_run
  strategy: micro_value       # F01 影子盘(0626 阶段1); dual_ma 路径保留未删
  symbols: []                 # 必须留空→DuckDB 全市场宇宙(mainboard_only 过滤); 非空会交集缩宇宙!
  strategy_params:
    top_n: 20                 # gate PASS 口径(阶段0 report), 勿用 registry 默认 9
  mainboard_only: true        # 宇宙装配层主板过滤(check_symbol_scope 60/000/001)
  execution_times: ["09:35", "14:50"]
  min_confidence: 0.6         # 截面信号恒 1.0, 此闸对影子盘无效(只约束 bar 策略)
  max_orders_per_cycle: 48    # 调仓日 ≤20买+≤20+卖
  per_order_notional_cap: 9000.0        # ¥146k/20≈7.3k+余量
  per_order_notional_ceiling: 10000.0   # 显式抬硬顶(默认 5000 是 0611 首单安全值)
  daily_notional_cap: 320000.0          # 调仓日双向 ~2×146k+余量
  daily_loss_limit_ratio: 0.02
  poll_timeout_seconds: 30
  position_ratio: 0.1
  bar_lookback: 100
  db_path: data/trading.db

monitor:
  refresh_interval: 3
  snapshot_dir: "data/snapshots/"
  alerts:
    daily_loss_threshold: 0.03
    stock_loss_threshold: 0.05
    position_ratio_max: 0.80
    position_ratio_min: 0.10
    concentration_max: 0.30
